<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting Company</title>
    <meta name="description"
      content="Get in touch with White Water Rafting Company. Contact us for inquiries, trip reservations, or support regarding your next rafting adventure.">
    <meta name="author" content="Mary Isaac Udoh">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <a href="#" class="logo-link">
            <img src="images/logo.jpg" alt="White Water Rafting" class="logo">
        </a>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="company-info">
            <h1>White Water Rafting Company</h1>
            <p>Lagos Island</p>
            <p>Lagos, Nigeria</p>
            <p>+2348072977313</p>
            <p>info@whitewater.com</p>
        </section>

        <section class="contact-split-container">
            <div class="map-column">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d42341017.28981139!2d-98.64841540000002!3d49.629977236749305!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sWhite-water%20rafting!5e0!3m2!1sen!2sng!4v1780928062422!5m2!1sen!2sng"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
                <div class="map-pin"></div>
            </div>

            <div class="form-column">
                <form action="#" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="user-name" placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="user-email" placeholder="Your Email">
                    </div>

                    <div class="form-group radio-group">
                        <label>Message Purpose</label>
                        <div class="radio-options">
                            <label for="general"><input type="radio" id="general" name="purpose"
                                  value="general" checked> General Inquiry</label>
                            <label for="reservation"><input type="radio" id="reservation"
                                  name="purpose" value="reservation"> Reservation Question</label>
                            <label for="suggestion"><input type="radio" id="suggestion"
                                  name="purpose" value="suggestion"> Website Suggestion</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="user-message" rows="4"
                          placeholder="Type here"></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label for="subscribe"><input type="checkbox" id="subscribe"
                              name="subscribe" checked> Please Subscribe me to the monthly
                            newsletter</label>
                    </div>
                    <button type="submit" class="submit-btn">Get in Touch!</button>
                </form>
            </div>
        </section>

        <section class="employee-section">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-grid">
                <figure class="profile-card">
                    <img src="images/profile1.png" alt="John Doe - Rafting Instructor" width="50">
                    <figcaption>John Doe - Instructor</figcaption>
                </figure>
                <figure class="profile-card">
                    <img src="images/profile2.png" alt="Jane Smith - Trip Coordinator" width="50">
                    <figcaption>Jane Smith - Coordinator</figcaption>
                </figure>
                <figure class="profile-card">
                    <img src="images/profile3.png" alt="Alex Jones - Customer Support" width="50">
                    <figcaption>Alex Jones - Support</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy;2026 White Water Rafting Company - Mary Isaac Udoh</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon" width="100">
            </a>
            <a href="https://whatsapp.com">
                <img src="images/whatsapp.svg" alt="Whatsapp Icon" width="100">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon" width="100">
            </a>
        </nav>
    </footer>
</body>

</html>
